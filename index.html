<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Саша — блок 0–7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@600;700;800&family=Wix+Madefor+Text:wght@400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="mesh-bg">
    <div class="mesh-orb mo1"></div>
    <div class="mesh-orb mo2"></div>
    <div class="mesh-orb mo3"></div>
    <div class="mesh-orb mo4"></div>
  </div>
  <div class="grain-overlay"></div>
  <canvas class="stars" id="stars"></canvas>
  <div class="comet"></div>

  <div class="demo-shell">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <div class="brand-title">Путь Саши</div>
          <div class="brand-subtitle">блок 0–7</div>
        </div>
      </div>

      <div class="student-card">
        <div class="student-avatar">
          <img src="./assets/sasha-face.png" alt="Саша">
        </div>
        <div>
          <div class="student-name">Саша</div>
          <div class="student-meta">Саше 17 лет · 11 класс · регион</div>
        </div>
      </div>

      <nav class="act-nav" id="actNav" aria-label="Блоки"></nav>

      <div class="block-card">
        <div class="block-card-kicker">Концепция продукта</div>
        <div class="block-card-title">AI-Наставник поступления</div>
        <div class="block-card-copy">В реальном времени связывает каждое действие с шансами на поступление</div>
      </div>
    </aside>

    <main class="stage">
      <header class="app-topbar"></header>
      <div class="stepper" id="stepper" aria-label="Шаги сценария"></div>

      <section class="product-frame">
        <div class="browser-bar">
          <div class="window-dots"><span></span><span></span><span></span></div>
          <div class="address">ordinary-platform/sasha</div>
          <div class="sync-status" id="syncStatus"></div>
        </div>
        <div class="screen" id="screen"></div>
      </section>

      <footer class="flow-controls">
        <button class="icon-button ghost" id="prevBtn" type="button" aria-label="Назад">←</button>
        <button class="text-button" id="primaryAction" type="button"></button>
        <button class="icon-button" id="nextBtn" type="button" aria-label="Дальше">→</button>
      </footer>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
